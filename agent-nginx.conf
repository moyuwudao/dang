# Agent API 反向代理配置
# 提供安全的远程访问，支持 HTTPS 和基础认证

server {
    listen 80;
    server_name 101.133.238.249;
    
    # 强制重定向到 HTTPS（配置SSL后启用）
    # return 301 https://$server_name$request_uri;
    
    # 日志配置
    access_log /var/log/nginx/agent-access.log;
    error_log /var/log/nginx/agent-error.log;
    
    # Agent API 路径
    location /agent/ {
        # 基础认证（用户名密码）
        auth_basic "Agent API Authentication";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        # 代理到本地 Agent
        proxy_pass http://127.0.0.1:8848/;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # 缓冲区设置
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # 健康检查（无需认证）
    location /agent/health {
        proxy_pass http://127.0.0.1:8848/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 拒绝直接访问 Agent 端口
    location / {
        return 404;
    }
}

